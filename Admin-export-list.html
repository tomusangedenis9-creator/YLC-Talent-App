<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Export Student List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <!-- Libraries for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; color: #1e293b; padding-bottom: 40px; }
        
        /* Top Navigation */
        .top-nav { 
            position: sticky; top: 0; width: 100%; display: flex; align-items: center; 
            padding: 16px 20px; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; z-index: 100; 
        }
        .back-btn { background: none; border: none; color: #1e293b; display: flex; align-items: center; cursor: pointer; margin-right: 16px; }
        .nav-title { font-size: 1.05rem; font-weight: 700; color: #0f172a; }

        .content-wrapper { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

        .section-title { font-size: 0.85rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

        /* Format Selection Grid */
        .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .format-card {
            background: white; border: 2px solid #e2e8f0; border-radius: 20px;
            padding: 20px 16px; text-align: center; cursor: pointer; transition: all 0.2s ease;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .format-card .material-symbols-outlined { font-size: 2rem; color: #94a3b8; transition: color 0.2s; }
        .format-card h4 { font-size: 0.9rem; font-weight: 600; color: #1e293b; }
        
        .format-card.selected { border-color: #7c3aed; background: #f3e8ff; }
        .format-card.selected .material-symbols-outlined { color: #7c3aed; }

        /* Data Inclusion Toggles */
        .data-options-card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; overflow: hidden; }
        .data-option-row { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f1f5f9; }
        .data-option-row:last-child { border-bottom: none; }
        
        .option-meta { display: flex; align-items: center; gap: 12px; }
        .option-meta .material-symbols-outlined { color: #64748b; font-size: 1.2rem; }
        .option-meta span { font-size: 0.9rem; font-weight: 500; color: #1e293b; }

        .custom-checkbox {
            appearance: none; width: 22px; height: 22px; border: 2px solid #cbd5e1;
            border-radius: 6px; cursor: pointer; position: relative; transition: all 0.2s ease;
        }
        .custom-checkbox:checked { background-color: #7c3aed; border-color: #7c3aed; }
        .custom-checkbox:checked::after {
            content: 'check'; font-family: 'Material Symbols Outlined'; color: white;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 14px; font-weight: bold;
        }

        /* Export Summary Banner */
        .summary-banner {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border-radius: 16px;
            padding: 16px; display: flex; align-items: center; gap: 16px; border: 1px dashed #cbd5e1;
        }
        .summary-icon {
            width: 40px; height: 40px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #7c3aed; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .summary-text h4 { font-size: 0.85rem; font-weight: 600; color: #0f172a; }
        .summary-text p { font-size: 0.75rem; color: #64748b; }

        /* Buttons */
        .btn-export { 
            width: 100%; background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); 
            color: white; border: none; padding: 18px; border-radius: 18px; 
            font-size: 0.95rem; font-weight: 600; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
            box-shadow: 0 6px 20px rgba(109, 40, 217, 0.3); margin-top: 8px; transition: opacity 0.3s;
        }
        .btn-export:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="back-btn" onclick="window.history.back()">
            <span class="material-symbols-outlined">arrow_back_ios_new</span>
        </button>
        <div class="nav-title">Export Track Data</div>
    </nav>

    <div class="content-wrapper">
        
        <!-- File Format Selection -->
        <div>
            <div class="section-title">1. Choose File Format</div>
            <div class="format-grid">
                <div class="format-card selected" data-format="csv" onclick="selectFormat(this)">
                    <span class="material-symbols-outlined">description</span>
                    <h4>CSV / Excel</h4>
                </div>
                <div class="format-card" data-format="pdf" onclick="selectFormat(this)">
                    <span class="material-symbols-outlined">picture_as_pdf</span>
                    <h4>PDF Report</h4>
                </div>
            </div>
        </div>

        <!-- Data Points Selection -->
        <div>
            <div class="section-title">2. Select Data to Include</div>
            <div class="data-options-card">
                <label class="data-option-row">
                    <div class="option-meta">
                        <span class="material-symbols-outlined">badge</span>
                        <span>Basic Info (Name, ID)</span>
                    </div>
                    <input type="checkbox" id="chkBasic" class="custom-checkbox" checked disabled style="opacity: 0.6;">
                </label>
                
                <label class="data-option-row">
                    <div class="option-meta">
                        <span class="material-symbols-outlined">mail</span>
                        <span>Contact Information</span>
                    </div>
                    <input type="checkbox" id="chkContact" class="custom-checkbox" checked>
                </label>

                <label class="data-option-row">
                    <div class="option-meta">
                        <span class="material-symbols-outlined">calendar_today</span>
                        <span>Enrollment Date</span>
                    </div>
                    <input type="checkbox" id="chkDate" class="custom-checkbox" checked>
                </label>
            </div>
        </div>

        <!-- Summary & Action -->
        <div>
            <div class="summary-banner">
                <div class="summary-icon"><span class="material-symbols-outlined">group</span></div>
                <div class="summary-text">
                    <h4 id="studentCountText">Loading Data...</h4>
                    <p>Current active roster</p>
                </div>
            </div>
        </div>

        <button class="btn-export" id="exportBtn">
            <div class="spinner" id="btnSpinner"></div>
            <span class="material-symbols-outlined" id="btnIcon">cloud_download</span> 
            <span id="btnText">Download File</span>
        </button>
    </div>

    <!-- UI Logic -->
    <script>
        let selectedFormat = 'csv'; // Default format

        function selectFormat(clickedCard) {
            const cards = document.querySelectorAll('.format-card');
            cards.forEach(card => card.classList.remove('selected'));
            clickedCard.classList.add('selected');
            selectedFormat = clickedCard.getAttribute('data-format');
        }
    </script>

    <!-- FIREBASE & EXPORT LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx4apmVQDOqH1bO7XqDkCOqVk7ElcWHVA",
            authDomain: "ylc-talent-app.firebaseapp.com",
            projectId: "ylc-talent-app",
            storageBucket: "ylc-talent-app.firebasestorage.app",
            messagingSenderId: "209480215567",
            appId: "1:209480215567:web:f04d6bf8da0355a2da877a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let studentRoster = [];

        // 1. Fetch real student data on page load
        async function loadStudentData() {
            try {
                // IMPORTANT: Change "users" to your actual student collection name if different!
                const querySnapshot = await getDocs(collection(db, "users")); 
                studentRoster = [];

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    // Optional: You can filter here if you only want users with role === 'student'
                    studentRoster.push({
                        id: doc.id,
                        name: data.name || data.fullName || 'Unknown',
                        email: data.email || 'N/A',
                        phone: data.phone || 'N/A',
                        dateJoined: data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString() : 'N/A',
                    });
                });

                document.getElementById('studentCountText').innerText = `${studentRoster.length} Students Ready`;
            } catch (error) {
                console.error("Error fetching students:", error);
                document.getElementById('studentCountText').innerText = "Error loading data.";
            }
        }

        // 2. Handle the Export Process
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (studentRoster.length === 0) {
                alert("No student data available to export.");
                return;
            }

            const btn = document.getElementById('exportBtn');
            const spinner = document.getElementById('btnSpinner');
            const icon = document.getElementById('btnIcon');
            const text = document.getElementById('btnText');

            // Show loading state
            btn.disabled = true;
            spinner.style.display = 'block';
            icon.style.display = 'none';
            text.innerText = 'Generating...';

            const includeContact = document.getElementById('chkContact').checked;
            const includeDate = document.getElementById('chkDate').checked;

            setTimeout(() => {
                if (selectedFormat === 'csv') {
                    generateCSV(includeContact, includeDate);
                } else {
                    generatePDF(includeContact, includeDate);
                }

                // Reset button state
                btn.disabled = false;
                spinner.style.display = 'none';
                icon.style.display = 'block';
                text.innerText = 'Download File';
            }, 1000); // Slight delay for UX
        });

        // Generate CSV File
        function generateCSV(includeContact, includeDate) {
            let csvContent = "data:text/csv;charset=utf-8,";
            
            // Construct Headers
            let headers = ["Student ID", "Full Name"];
            if (includeContact) headers.push("Email", "Phone");
            if (includeDate) headers.push("Enrollment Date");
            csvContent += headers.join(",") + "\r\n";

            // Construct Rows
            studentRoster.forEach(student => {
                let row = [`"${student.id}"`, `"${student.name}"`];
                if (includeContact) row.push(`"${student.email}"`, `"${student.phone}"`);
                if (includeDate) row.push(`"${student.dateJoined}"`);
                csvContent += row.join(",") + "\r\n";
            });

            // Trigger Download
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Student_Roster.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Generate PDF File using jsPDF
        function generatePDF(includeContact, includeDate) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(16);
            doc.text("Official Student Roster", 14, 20);
            doc.setFontSize(10);
            doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 14, 28);

            // Construct Table Columns
            let head = [['ID', 'Full Name']];
            if (includeContact) head[0].push('Email', 'Phone');
            if (includeDate) head[0].push('Date Joined');

            // Construct Table Body
            let body = studentRoster.map(student => {
                let row = [student.id.substring(0,6) + '...', student.name];
                if (includeContact) row.push(student.email, student.phone);
                if (includeDate) row.push(student.dateJoined);
                return row;
            });

            // AutoTable Plugin
            doc.autoTable({
                startY: 35,
                head: head,
                body: body,
                theme: 'grid',
                headStyles: { fillColor: [124, 58, 237] }, // Purple matching the UI
                styles: { fontSize: 9 }
            });

            doc.save('Student_Roster.pdf');
        }

        // Initialize
        loadStudentData();
    </script>
  <script>
    // Get the track from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const trackId = urlParams.get('track');
    
    // Example: If you are on the announce page, set the hidden field 
    // or title based on the trackId
    if (trackId) {
        console.log("Operating on track: " + trackId);
        // If you have a title on the page, update it:
        // document.getElementById('pageTitle').innerText = "Announce to " + trackId;
    }
</script>


</body>
</html>
