<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resource Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; color: #1e293b; padding-bottom: 100px; }

        /* Top Navigation */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 16px 20px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        .nav-btn {
            background: #ffffff; border: 1px solid #e2e8f0; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #1e293b; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .nav-title { font-size: 1rem; font-weight: 600; }

        .content-wrapper { margin-top: 80px; padding: 0 20px; }

        /* Dynamic Media Section (Image or Video) */
        .hero-media-box {
            width: 100%; height: 240px; border-radius: 24px; overflow: hidden;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 24px; background: #000;
        }
        .hero-media-box img, .hero-media-box video { width: 100%; height: 100%; object-fit: cover; }
        
        .floating-badge {
            position: absolute; top: 16px; left: 16px; background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
            color: #7c3aed; display: flex; align-items: center; gap: 4px; z-index: 10;
        }

        .rotate-badge {
            position: absolute; bottom: 16px; right: 16px; background: rgba(0, 0, 0, 0.7);
            color: white; padding: 8px 14px; border-radius: 12px; font-size: 0.8rem;
            font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); z-index: 10; backdrop-filter: blur(5px);
        }

        /* Resource Details */
        .resource-header h1 { font-size: 1.4rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; color: #0f172a; }
        .author-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .author-row img { width: 28px; height: 28px; border-radius: 50%; }
        .author-row p { font-size: 0.85rem; color: #64748b; }

        .description-block {
            background: #ffffff; padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid #f1f5f9;
        }
        .description-block h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; color: #1e293b; }
        .description-block p { font-size: 0.9rem; color: #475569; line-height: 1.7; white-space: pre-wrap; }

        /* Bottom Action Bar */
        .bottom-action-bar {
            position: fixed; bottom: 76px; left: 0; width: 100%; background: #ffffff;
            padding: 16px 20px; border-top: 1px solid #e2e8f0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            display: flex; gap: 12px; z-index: 100;
        }
        .btn-secondary {
            background: #f1f5f9; color: #1e293b; border: none; width: 56px;
            border-radius: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-primary {
            flex: 1; background: #7c3aed; color: white; border: none; padding: 16px;
            border-radius: 16px; font-size: 1rem; font-weight: 600; display: flex;
            justify-content: center; align-items: center; gap: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); transition: all 0.3s ease;
        }

        /* --- BOTTOM NAVIGATION TRAY STYLES --- */
        .bottom-navigation-tray {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #ffffff; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 10px 20px 10px; z-index: 900;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }
        .nav-tray-item {
            background: none; border: none; display: flex; flex-direction: column;
            align-items: center; gap: 4px; color: #94a3b8; cursor: pointer;
            transition: all 0.2s ease;
        }
        .nav-tray-item .tray-icon { font-size: 1.5rem; }
        .nav-tray-item .tray-label { font-size: 0.7rem; font-weight: 500; }
        .nav-tray-item.active-tray { color: #8b5cf6; }

        .skeleton-text { background: #e2e8f0; border-radius: 4px; height: 20px; margin-bottom: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="nav-btn" onclick="history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="nav-title">Resource Details</div>
        <button class="nav-btn" onclick="toggleSave(this)">
            <span class="material-symbols-outlined" id="saveIcon">bookmark_border</span>
        </button>
    </nav>

    <div class="content-wrapper">
        
        <div class="hero-media-box" id="mediaContainer">
            <div style="width:100%; height:100%; background:#cbd5e1; display:flex; align-items:center; justify-content:center;">
                <span class="material-symbols-outlined" style="color:#fff; font-size: 3rem;">hourglass_empty</span>
            </div>
        </div>

        <div class="resource-header">
            <h1 id="resTitle"><div class="skeleton-text" style="width: 80%;"></div></h1>
            <div class="author-row">
                <img src="https://ui-avatars.com/api/?name=YLC+Team&background=1e293b&color=fff" alt="Author">
                <p>Published by <strong>YLC Admin</strong></p>
            </div>
        </div>

        <div class="description-block">
            <h3>About this resource</h3>
            <p id="resDesc"><div class="skeleton-text" style="width: 100%;"></div><div class="skeleton-text" style="width: 60%;"></div></p>
        </div>
    </div>

    <div class="bottom-action-bar">
        <button class="btn-secondary" onclick="shareResource()">
            <span class="material-symbols-outlined">share</span>
        </button>
        
        <button class="btn-primary" id="primaryActionBtn" disabled>
            Loading...
        </button>
    </div>

    <nav class="bottom-navigation-tray">
        <button class="nav-tray-item" onclick="window.location.href='student-dashboard.html'">
            <span class="material-symbols-outlined tray-icon">home</span>
            <span class="tray-label">Home</span>
        </button>
        <button class="nav-tray-item active-tray" onclick="window.location.href='resources.html'">
            <span class="material-symbols-outlined tray-icon">menu_book</span>
            <span class="tray-label">Resources</span>
        </button>
        <button class="nav-tray-item" onclick="window.location.href='community.html'">
            <span class="material-symbols-outlined tray-icon">group</span>
            <span class="tray-label">Community</span>
        </button>
        <button class="nav-tray-item" onclick="window.location.href='profile.html'">
            <span class="material-symbols-outlined tray-icon">person</span>
            <span class="tray-label">Profile</span>
        </button>
    </nav>

    <script>
        function toggleSave(btn) {
            const icon = document.getElementById('saveIcon');
            icon.innerText = icon.innerText === 'bookmark_border' ? 'bookmark' : 'bookmark_border';
            icon.style.color = icon.innerText === 'bookmark' ? '#7c3aed' : '#1e293b';
        }

        function shareResource() {
            if (navigator.share) {
                navigator.share({ title: document.title, url: window.location.href });
            } else {
                alert("Share link copied to clipboard!");
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx4apmVQDOqH1bO7XqDkCOqVk7ElcWHVA",
            authDomain: "ylc-talent-app.firebaseapp.com",
            projectId: "ylc-talent-app",
            storageBucket: "ylc-talent-app.firebasestorage.app",
            messagingSenderId: "209480215567",
            appId: "1:209480215567:web:f04d6bf8da0355a2da877a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const resourceId = urlParams.get('id');

        // Handled directly inside scope to resolve undefined handler problems
        window.enterFullscreenAndRotate = function() {
            const videoElement = document.getElementById('mainVideoPlayer');
            if (!videoElement) return;

            if (videoElement.requestFullscreen) {
                videoElement.requestFullscreen();
            } else if (videoElement.webkitRequestFullscreen) {
                videoElement.webkitRequestFullscreen();
            }

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(err => console.log("Orientation lock not supported", err));
            }
        };

        async function loadResourceDetails() {
            if (!resourceId) {
                document.getElementById('resTitle').innerText = "Resource Not Found";
                document.getElementById('resDesc').innerText = "Please go back and select a valid resource from the dashboard.";
                return;
            }

            try {
                const docRef = doc(db, "track_resources", resourceId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    let trackName = data.track ? data.track.replace('-', ' ') : 'General';
                    trackName = trackName.replace(/\b\w/g, l => l.toUpperCase());

                    document.getElementById('resTitle').innerText = data.title;
                    document.getElementById('resDesc').innerText = data.subtitle || "No description provided.";

                    const mediaContainer = document.getElementById('mediaContainer');
                    const primaryBtn = document.getElementById('primaryActionBtn');

                    if (data.category === 'video') {
                        mediaContainer.innerHTML = `
                            <div class="floating-badge"><span class="material-symbols-outlined" style="font-size: 1rem;">movie</span> ${trackName}</div>
                            <video id="mainVideoPlayer" src="${data.linkUrl}" controls controlsList="nodownload"></video>
                            <button class="rotate-badge" onclick="window.enterFullscreenAndRotate()">
                                <span class="material-symbols-outlined" style="font-size: 1.1rem;">screen_rotation</span> Rotate
                            </button>
                        `;
                        primaryBtn.innerHTML = `<span class="material-symbols-outlined">play_circle</span> Watch Video`;
                        primaryBtn.disabled = false;
                        primaryBtn.onclick = () => document.getElementById('mainVideoPlayer').play();
                        
                    } else {
                        let coverImg = "https://images.unsplash.com/photo-1588508065123-287b28e0131b?q=80&w=1000&auto=format&fit=crop";
                        let iconType = "description";
                        
                        if(data.category === 'template') { coverImg = "https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000&auto=format&fit=crop"; iconType = "link"; }
                        if(data.category === 'pdf') { iconType = "picture_as_pdf"; }

                        mediaContainer.innerHTML = `
                            <div class="floating-badge"><span class="material-symbols-outlined" style="font-size: 1rem;">${iconType}</span> ${trackName}</div>
                            <img src="${coverImg}" alt="Cover">
                        `;
                        
                        primaryBtn.innerHTML = `<span class="material-symbols-outlined">open_in_new</span> Open Resource`;
                        primaryBtn.disabled = false;
                        primaryBtn.onclick = () => window.open(data.linkUrl, '_blank');
                    }
                } else {
                    document.getElementById('resTitle').innerText = "Resource Removed";
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                document.getElementById('resTitle').innerText = "Error Loading Data";
            }
        }

        loadResourceDetails();
    </script>
</body>
</html>
