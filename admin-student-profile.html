<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; color: #1e293b; }
        
        /* Top Navigation */
        .top-nav { position: sticky; top: 0; background: white; padding: 16px 20px; display: flex; align-items: center; border-bottom: 1px solid #f1f5f9; z-index: 100; }
        .back-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-right: 16px; display: flex; }
        .nav-title { font-weight: 600; font-size: 1.1rem; }

        .content { padding: 20px; }

        /* Profile Header */
        .profile-card { background: white; border-radius: 24px; padding: 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid #f1f5f9; }
        .avatar-large { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 12px; display: block; border: 3px solid #f3e8ff; object-fit: cover; }
        .profile-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .profile-card p { font-size: 0.85rem; color: #64748b; margin-bottom: 16px; }
        
        .badge-row { display: flex; justify-content: center; gap: 8px; }
        .badge { background: #f3e8ff; color: #7c3aed; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }

        /* Quick Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-box { background: white; padding: 16px; border-radius: 16px; border: 1px solid #f1f5f9; text-align: center; }
        .stat-box h3 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .stat-box p { font-size: 0.75rem; color: #64748b; font-weight: 500; }

        /* Recent Activity */
        .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
        .activity-card { background: white; padding: 16px; border-radius: 16px; border: 1px solid #f1f5f9; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .activity-icon { background: #dbeafe; color: #2563eb; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; }
        .activity-details h4 { font-size: 0.85rem; font-weight: 600; }
        .activity-details p { font-size: 0.75rem; color: #64748b; }
        
        /* Message Button */
        .btn-message { width: 100%; background: #1e293b; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 600; font-size: 0.95rem; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; cursor: pointer; transition: opacity 0.2s; }
        .btn-message:active { opacity: 0.8; }
        .btn-message:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Loading Skeleton */
        .skeleton-text { background: #e2e8f0; border-radius: 4px; height: 16px; margin: 4px auto; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>
    <nav class="top-nav">
        <button class="back-btn" onclick="window.history.back()"><span class="material-symbols-outlined">arrow_back</span></button>
        <div class="nav-title">Student Profile</div>
    </nav>

    <div class="content">
        <div class="profile-card">
            <img src="https://ui-avatars.com/api/?name=Loading&background=e2e8f0&color=94a3b8" id="studentAvatar" class="avatar-large">
            <h2 id="studentName"><div class="skeleton-text" style="width: 60%;"></div></h2>
            <p id="studentEmail"><div class="skeleton-text" style="width: 40%;"></div></p>
            <div class="badge-row">
                <span class="badge" id="studentTrack">LOADING...</span>
                <span class="badge" style="background: #dcfce7; color: #16a34a;" id="studentStatus">Active</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="statCompletion">--%</h3>
                <p>Completion</p>
            </div>
            <div class="stat-box">
                <h3 id="statModules">--</h3>
                <p>Modules Done</p>
            </div>
        </div>

        <h3 class="section-title">Recent Activity</h3>
        <div class="activity-card">
            <div class="activity-icon"><span class="material-symbols-outlined">app_registration</span></div>
            <div class="activity-details">
                <h4>Account Created</h4>
                <p id="joinDateText">Loading date...</p>
            </div>
        </div>
        <div class="activity-card">
            <div class="activity-icon" style="background: #fef3c7; color: #d97706;"><span class="material-symbols-outlined">school</span></div>
            <div class="activity-details">
                <h4>Assigned to Track</h4>
                <p id="trackAssignText">Loading track...</p>
            </div>
        </div>

        <button class="btn-message" id="messageBtn" disabled>
            <span class="material-symbols-outlined">chat</span> Send Message
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx4apmVQDOqH1bO7XqDkCOqVk7ElcWHVA",
            authDomain: "ylc-talent-app.firebaseapp.com",
            projectId: "ylc-talent-app",
            storageBucket: "ylc-talent-app.firebasestorage.app",
            messagingSenderId: "209480215567",
            appId: "1:209480215567:web:f04d6bf8da0355a2da877a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get student ID from the URL (e.g.,profile.html?id=xyz123)
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        async function loadStudentProfile() {
            if (!studentId) {
                document.getElementById('studentName').innerText = "Student Not Found";
                document.getElementById('studentEmail').innerText = "Invalid ID in URL";
                return;
            }

            try {
                // Fetch user data from 'users' collection
                const docRef = doc(db, "users", studentId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Format Name and Track
                    const fullName = data.name || data.fullName || 'Unknown Student';
                    const email = data.email || 'No email provided';
                    let trackName = data.track ? data.track.replace('-', ' ') : 'General';
                    
                    // Capitalize track name nicely
                    trackName = trackName.replace(/\b\w/g, l => l.toUpperCase());

                    // Format Joined Date
                    let joinDate = "Recently";
                    if (data.createdAt) {
                        joinDate = new Date(data.createdAt.toDate()).toLocaleDateString();
                    }

                    // Update UI Elements
                    document.getElementById('studentName').innerText = fullName;
                    document.getElementById('studentEmail').innerText = email;
                    document.getElementById('studentTrack').innerText = trackName;
                    
                    document.getElementById('joinDateText').innerText = `Joined on ${joinDate}`;
                    document.getElementById('trackAssignText').innerText = `Track: ${trackName}`;

                    // Update Avatar dynamically based on their name
                    document.getElementById('studentAvatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=f3e8ff&color=7c3aed&size=150`;

                    // For now, mock stats (you can pull these from Firebase later when you track progress)
                    document.getElementById('statCompletion').innerText = "0%";
                    document.getElementById('statModules').innerText = "0";

                    // Enable Message Button and attach the student ID to the URL
                    const msgBtn = document.getElementById('messageBtn');
                    msgBtn.disabled = false;
                    msgBtn.onclick = () => {
                        // Passes the target student ID to your message screen
                        window.location.href = `admin-message.html?userId=${studentId}&name=${encodeURIComponent(fullName)}`;
                    };

                } else {
                    document.getElementById('studentName').innerText = "User Deleted";
                    document.getElementById('studentEmail').innerText = "This profile no longer exists.";
                    document.getElementById('studentTrack').style.display = 'none';
                    document.getElementById('studentStatus').style.display = 'none';
                }
            } catch (error) {
                console.error("Error fetching student profile:", error);
                document.getElementById('studentName').innerText = "Connection Error";
                document.getElementById('studentEmail').innerText = "Could not load data.";
            }
        }

        loadStudentProfile();
    </script>
</body>
</html>
