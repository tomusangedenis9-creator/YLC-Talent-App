<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YLC Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* A slightly darker gradient to distinguish the admin side */
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Top Security Badge */
        .admin-badge {
            background: #1e293b;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #f1f5f9;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 3rem;
            color: #7c3aed;
            margin-bottom: 8px;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #7c3aed;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 38px;
            color: #94a3b8;
            font-size: 1.2rem;
        }

        .btn-primary {
            width: 100%;
            background: #1e293b; /* Darker button for admin */
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(30, 41, 59, 0.2);
            transition: background 0.3s;
        }

        .btn-primary:active {
            background: #0f172a;
        }

        .return-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="admin-badge">
        <span class="material-symbols-outlined" style="font-size: 1rem;">admin_panel_settings</span>
        Secure Admin Portal
    </div>

    <div class="login-card">
        <div class="logo-area">
            <span class="material-symbols-outlined logo-icon">shield_lock</span>
            <h1>YLC Workspace</h1>
            <p>Sign in to manage students and feeds</p>
        </div>

        <div class="input-group">
            <label for="adminEmail">Admin Email</label>
            <span class="material-symbols-outlined input-icon">mail</span>
            <input type="email" id="adminEmail" class="input-field" placeholder="admin@ylc.com" required>
        </div>

        <div class="input-group">
            <label for="adminPassword">Password</label>
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" id="adminPassword" class="input-field" placeholder="••••••••" required>
        </div>

        <button class="btn-primary" onclick="adminLogin()">
            Authenticate <span class="material-symbols-outlined" style="font-size: 1.2rem;">arrow_forward</span>
        </button>

        <a href="login.html" class="return-link">Return to Student Login</a>
    </div>

    <script>
        function adminLogin() {
            // For now, this just fakes the login and routes to your new admin dashboard
            const btn = document.querySelector('.btn-primary');
            btn.innerHTML = 'Verifying... <span class="material-symbols-outlined" style="animation: spin 1s linear infinite;">sync</span>';
            
            setTimeout(() => {
                window.location.href = "admin-dashboard.html";
            }, 1500);
        }
    </script>

</body>
</html>
