<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YLC Community Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="community.css">
</head>
<body>

    <header class="header">
        <button class="icon-btn"><span class="material-symbols-outlined">menu</span></button>
        <div class="header-title">
            <h2>Community Feed</h2>
            <p>See what's happening across all tracks</p>
        </div>
        <div class="bell-icon-wrapper">
            <button class="icon-btn"><span class="material-symbols-outlined">notifications</span></button>
            <span class="bell-badge">3</span>
        </div>
    </header>

    <div class="filter-scroll" id="filterContainer">
        <div class="filter-chip active" data-filter="all" onclick="filterFeed('all')">
            <span class="material-symbols-outlined">grid_view</span> All Posts
        </div>
        <div class="filter-chip" data-filter="creative-arts" onclick="filterFeed('creative-arts')">
            <span class="material-symbols-outlined">palette</span> Creative Arts
        </div>
        <div class="filter-chip" data-filter="digital-skills" onclick="filterFeed('digital-skills')">
            <span class="material-symbols-outlined">laptop_mac</span> Digital Skills
        </div>
        <div class="filter-chip" data-filter="leadership" onclick="filterFeed('leadership')">
            <span class="material-symbols-outlined">groups</span> Leadership
        </div>
        <div class="filter-chip" data-filter="entrepreneurship" onclick="filterFeed('entrepreneurship')">
            <span class="material-symbols-outlined">work</span> Entrepreneurship
        </div>
    </div>

    <div id="feedContainer" style="padding-bottom: 80px;">
        <p style="text-align: center; color: #94a3b8; padding: 40px 0;">Loading community posts...</p>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='student-dashboard.html'">
            <span class="material-symbols-outlined">home</span>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="window.location.href='resources.html'">
            <span class="material-symbols-outlined">menu_book</span>
            <span>Resources</span>
        </button>
        <button class="nav-item active">
            <span class="material-symbols-outlined">group</span>
            <span>Community</span>
        </button>
        <button class="nav-item" onclick="window.location.href='profile.html'">
            <span class="material-symbols-outlined">person</span>
            <span>Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx4apmVQDOqH1bO7XqDkCOqVk7ElcWHVA",
            authDomain: "ylc-talent-app.firebaseapp.com",
            projectId: "ylc-talent-app",
            storageBucket: "ylc-talent-app.firebasestorage.app",
            messagingSenderId: "209480215567",
            appId: "1:209480215567:web:f04d6bf8da0355a2da877a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let cachedPosts = [];
        let currentFilter = 'all';
        let currentUser = null;

        const feedContainer = document.getElementById('feedContainer');

        const trackStyles = {
            'creative-arts': { label: 'Creative Arts', icon: 'palette', color: '#b45309', bg: '#fde68a' },
            'digital-skills': { label: 'Digital Skills', icon: 'laptop_mac', color: '#1d4ed8', bg: '#bfdbfe' },
            'leadership': { label: 'Leadership', icon: 'groups', color: '#be185d', bg: '#fbcfe8' },
            'entrepreneurship': { label: 'Entrepreneurship', icon: 'work', color: '#166534', bg: '#bbf7d0' },
            'general': { label: 'General', icon: 'campaign', color: '#475569', bg: '#f1f5f9' }
        };

        // Get Logged-in User
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            }
        });

        // Pull Live Posts
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            cachedPosts = [];
            snapshot.forEach((doc) => {
                cachedPosts.push({ id: doc.id, ...doc.data() });
            });
            renderFeed();
        }, (error) => {
            console.error("Error fetching posts:", error);
            feedContainer.innerHTML = `<p style="text-align: center; color: #ef4444; padding: 20px;">Could not load feed. Check database rules.</p>`;
        });

        // Render UI
        function renderFeed() {
            feedContainer.innerHTML = "";
            const filteredPosts = cachedPosts.filter(post => currentFilter === 'all' || post.track === currentFilter);

            if (filteredPosts.length === 0) {
                feedContainer.innerHTML = `<p style="text-align: center; color: #94a3b8; padding: 40px 0;">No posts in this track yet.</p>`;
                return;
            }

            filteredPosts.forEach(post => {
                const trackKey = post.track || 'general';
                const style = trackStyles[trackKey] || trackStyles['general'];
                
                let timeString = "Recently";
                if (post.createdAt && post.createdAt.toDate) {
                    const date = post.createdAt.toDate();
                    timeString = date.toLocaleDateString() + ' at ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                // Title check
                const titleHtml = post.title ? `<h3 style="font-size: 1rem; color: #0f172a; margin-bottom: 6px;">${post.title}</h3>` : "";

                const postCard = document.createElement('div');
                postCard.className = 'feed-card';
                postCard.setAttribute('data-track', trackKey);

                postCard.innerHTML = `
                    <div class="card-header">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(post.authorName || 'User')}&background=${style.bg.replace('#','')}&color=${style.color.replace('#','')}" class="card-avatar" alt="Avatar">
                        <div class="card-meta">
                            <h4>${post.authorName || 'Unknown User'}</h4>
                            <p>${timeString}</p>
                        </div>
                        <div class="track-badge">
                            <span class="material-symbols-outlined">${style.icon}</span>
                            ${style.label}
                        </div>
                    </div>
                    
                    <div class="post-text">
                        ${titleHtml}
                        ${post.text || ''}
                    </div>
                `;
                feedContainer.appendChild(postCard);
            });
        }

        // --- GLOBAL FUNCTIONS ---

        window.filterFeed = function(track) {
            currentFilter = track;
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.getAttribute('data-filter') === track) {
                    chip.classList.add('active');
                }
            });
            renderFeed();
        };

    </script>
</body>
</html>
